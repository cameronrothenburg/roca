name: Bug Report
description: Something isn't working correctly
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting. Please include enough detail to reproduce the issue.

  - type: input
    id: version
    attributes:
      label: Roca version
      description: Output of `roca --version`
      placeholder: "0.2.0"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: roca-source
    attributes:
      label: Roca source
      description: The `.roca` code that triggers the issue.
      render: text
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What should have happened?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: What actually happened? Include compiler output or JS output.
      render: text
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Parser
        - Type checker
        - JS emit
        - Crash blocks
        - Test harness / fuzz
        - .d.ts generation
        - LSP
        - CLI
        - Stdlib
    validations:
      required: true
