[package]
name = "roca"
version = "0.2.4"
edition = "2024"
license = "AGPL-3.0-only"
description = "A contractual language for the AI era"
repository = "https://github.com/cameronrothenburg/roca"

[dependencies]
oxc_allocator = "0.122"
oxc_ast = "0.122"
oxc_codegen = "0.122"
oxc_span = "0.122"
tower-lsp = "0.20"
tokio = { version = "1", features = ["full"] }
dashmap = "6"
deno_core = "0.395.0"
uuid = { version = "1.23.0", features = ["v4"] }
url = "2.5.8"
serde_json = "1.0.149"
sha2 = "0.11.0"
oxc_parser = "0.122"
cranelift-codegen = "0.130"
cranelift-frontend = "0.130"
cranelift-module = "0.130"
cranelift-jit = "0.130"
cranelift-native = "0.130"
cranelift-object = "0.130"
