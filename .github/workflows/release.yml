name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Set version from tag
        run: |
          sed -i "s/^version = \".*\"/version = \"${{ steps.version.outputs.VERSION }}\"/" Cargo.toml
          cargo generate-lockfile
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add Cargo.toml Cargo.lock
          git commit -m "chore(deps): bump version to ${{ steps.version.outputs.VERSION }}"

      - name: Build
        run: cargo build --release

      - name: Run tests
        run: cargo test

      - name: CLI smoke test
        run: |
          cargo install --path .
          roca check tests/js/projects/api

      - name: Install bun
        uses: oven-sh/setup-bun@v2

      - name: Run JS tests
        run: |
          cd tests/js
          bun install
          bun test

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Roca v${{ steps.version.outputs.VERSION }}
          generate_release_notes: true
          files: |
            target/release/roca

      - name: Publish to crates.io
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Set runtime version from tag
        working-directory: packages/runtime
        run: npm version ${{ steps.version.outputs.VERSION }} --no-git-tag-version

      - name: Publish runtime to npm
        working-directory: packages/runtime
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
