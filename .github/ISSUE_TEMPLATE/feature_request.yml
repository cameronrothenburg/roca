name: Feature Request
description: Suggest an improvement or new feature
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Describe the feature and why it would be useful.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What limitation or pain point does this address?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How should this work? Include Roca syntax examples if applicable.
      render: text
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you've thought about.

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Language syntax
        - Compiler rules
        - Crash block strategies
        - Stdlib
        - JS integration / extern
        - .d.ts / TypeScript
        - Tooling (CLI, LSP, search)
        - Documentation
    validations:
      required: true
