[package]
name = "roca"
version = "0.2.1"
edition = "2024"
license = "AGPL-3.0-only"
description = "A contractual language that compiles to JavaScript"
repository = "https://github.com/cameronrothenburg/roca"

[dependencies]
oxc_allocator = "0.122"
oxc_ast = "0.122"
oxc_codegen = "0.122"
oxc_span = "0.122"
tower-lsp = "0.20"
tokio = { version = "1", features = ["full"] }
dashmap = "6"
deno_core = "0.395.0"
